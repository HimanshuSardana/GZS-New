server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA catch-all ───────────────────────────────────────────────────────
    # Every URL that is not a real file is served as index.html so React Router
    # handles the route on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Core API reverse proxy ───────────────────────────────────────────────
    # VITE_CORE_API_URL=/api/core in Docker builds → requests arrive here.
    # Strip /api/core prefix before forwarding to the core-api container.
    location /api/core/ {
        proxy_pass         http://core-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── CMS API reverse proxy ────────────────────────────────────────────────
    # VITE_CMS_API_URL=/api/cms in Docker builds → requests arrive here.
    # Strip /api/cms prefix before forwarding to the cms-api container.
    location /api/cms/ {
        proxy_pass         http://cms-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Hashed static assets — long cache ───────────────────────────────────
    # Vite outputs assets/[name].[hash].[ext] so these are safe to cache forever.
    location /assets/ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript image/svg+xml;
    gzip_min_length   1024;
    gzip_vary         on;
}
